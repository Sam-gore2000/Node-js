<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL Shortner App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="main">
      <h2 class="heading">URL Shortner</h2>

      <form id="shortner">
    <div class="input">
          <label for="">Enter URL</label> <br/>
        <input type="text" placeholder="Enter URL Link" id="url"  name="url">
    </div>
    <div class="input">
          <label for="">Custome Short URL</label><br/>
        <input type="text" placeholder="Enter Short code" id="shortcode" name="shortcode">
    </div>

    <div>
      <button>Submit</button>
    </div>
      </form>

      <h2>Short URL</h2>
      <p id="result"></p>
    </div>
  </div>

 <script>
  document.getElementById('shortner').addEventListener('submit', async (e) => {
    e.preventDefault();

    const formData = new FormData(e.target);
    const url = formData.get('url');
    const shortcode = formData.get('shortcode');

    try {
      const res = await fetch('/shorten', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url, shortcode })
      });

      const data = await res.json();

      if (data.shortUrl) {
        document.getElementById('result').innerHTML =
          `<a href="${data.shortUrl}" target="_blank">${data.shortUrl}</a>`;
      } else {
        document.getElementById('result').innerText = data.message;
      }

    } catch (err) {
      console.error(err);
      document.getElementById('result').innerText = "Error creating short URL";
    }
  });
</script>
</body>
</html>
