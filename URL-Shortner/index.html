<html lang="en">

<body>

    </div>
      </form>

      <h2>Short URL</h2>
      <p id="result"></p>
    </div>
  </div>

  <script>
    
    const shortner=document.getElementById('shortner').addEventListener('submit',(e)=>{
e.preventDefault();
const formData= new FormData(event.target);
const url=formData.get('url');
const shortcode=formData.get('shortcode')
console.log(url,shortcode);

    })
  </script>
</body>
</html>
